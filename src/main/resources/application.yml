spring:
  application:
    name: ianfc

  web:
    resources:
      cache:
        period: 0

  datasource:
    url: jdbc:postgresql://localhost:5432/ianfc
    username: ianfc_user
    password: changeme
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      max-poll-records: 100
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 1

kafka:
  topic:
    telemetry-raw: network.telemetry.raw
    faults-correlated: network.faults.correlated

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    kafka:
      enabled: true

correlation:
  window:
    seconds: 30
  alarm:
    threshold: 3

generator:
  interval:
    ms: 500

logging:
  level:
    com.acp.cw3.ianfc: DEBUG
    org.springframework.web: DEBUG
    org.springframework.kafka: INFO
    org.flywaydb: INFO
